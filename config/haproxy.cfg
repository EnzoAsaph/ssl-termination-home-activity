global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    # Only allow TLS 1.2+ on the terminating frontend
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# ---------------------------------------------------------------------------
# HTTPS front door — TLS is TERMINATED here using the self-signed certificate
# (generated by scripts/setup-lb-ssl.sh into /etc/haproxy/certs/lb-01.pem,
# which is the cert + private key concatenated, as HAProxy expects).
# ---------------------------------------------------------------------------
frontend https-in
    bind *:443 ssl crt /etc/haproxy/certs/lb-01.pem
    # Tell the backends the original request came in over HTTPS
    http-request set-header X-Forwarded-Proto https
    default_backend web-servers

# Plain-HTTP frontend: permanently redirect everything to HTTPS so the
# only way through the load balancer is the encrypted front door.
frontend http-in
    bind *:80
    http-request redirect scheme https code 301

# ---------------------------------------------------------------------------
# Backend — traffic from lb-01 to the web servers is PLAIN HTTP (port 80).
# That is the "SSL termination" part: encryption ends at the load balancer.
# The web servers' UFW rules only accept this traffic from 172.25.0.10.
# ---------------------------------------------------------------------------
backend web-servers
    balance roundrobin
    option httpchk GET /
    server web-01 172.25.0.11:80 check
    server web-02 172.25.0.12:80 check
